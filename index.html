<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="To-Do List Life Dashboard - A simple, elegant task management and productivity tool">
    <title>Life Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <!-- Greeting Section -->
        <section id="greeting" class="greeting-section">
            <div class="time-display"></div>
            <div class="date-display"></div>
            <div class="greeting-message"></div>
        </section>

        <!-- Tasks Section -->
        <section id="tasks" class="tasks-section">
            <h2>Tasks</h2>
            <div class="task-input-container">
                <input type="text" id="task-input" placeholder="Add a new task..." aria-label="New task input">
                <button id="add-task-btn" aria-label="Add task">Add</button>
            </div>
            <div class="task-controls">
                <label for="sort-order">Sort by:</label>
                <select id="sort-order" aria-label="Sort tasks">
                    <option value="creation">Creation order</option>
                    <option value="completion">Completion status</option>
                </select>
            </div>
            <ul id="task-list" class="task-list"></ul>
        </section>

        <!-- Focus Timer Section -->
        <section id="timer" class="timer-section">
            <h2>Focus Timer</h2>
            <div class="timer-display">25:00</div>
            <div class="timer-controls">
                <button id="timer-start" aria-label="Start timer">Start</button>
                <button id="timer-stop" aria-label="Stop timer">Stop</button>
                <button id="timer-reset" aria-label="Reset timer">Reset</button>
            </div>
            <div class="timer-settings">
                <label for="timer-duration">Duration (minutes):</label>
                <input type="number" id="timer-duration" min="1" max="120" value="25" aria-label="Timer duration in minutes">
            </div>
        </section>

        <!-- Quick Links Section -->
        <section id="quick-links" class="quick-links-section">
            <h2>Quick Links</h2>
            <div class="link-input-container">
                <input type="url" id="link-url" placeholder="URL" aria-label="Link URL">
                <input type="text" id="link-name" placeholder="Display name (optional)" aria-label="Link display name">
                <button id="add-link-btn" aria-label="Add link">Add Link</button>
            </div>
            <ul id="quick-links-list" class="links-list"></ul>
        </section>

        <!-- Theme Toggle -->
        <div id="theme-toggle" class="theme-toggle">
            <button id="theme-toggle-btn" aria-label="Toggle theme">
                <span class="theme-icon">🌙</span>
            </button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
